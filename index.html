<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crusade Sector Template</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <main class="layout">
      <section class="panel map-panel">
        <div class="map-wrap" id="map-wrap">
          <div class="map-background-image" id="map-background"></div>
          <div class="map-title">Sector Map</div>
          <svg id="sector-map" viewBox="0 0 1764 1411" role="img" aria-label="Crusade sector map"></svg>
          <div class="map-controls">
            <button id="zoom-in" class="map-btn">＋</button>
            <button id="zoom-out" class="map-btn">−</button>
            <button id="zoom-reset" class="map-btn">↺</button>
          </div>
          
          
            <div id="faction-nav-tabs" class="faction-tabs-container navigation-overlay-style"></div>
  
            <div id="player-nav-links" class="player-links-container navigation-overlay-style"></div>

        </div>
      </section>



      <aside class="panel details-panel">
        <section id="details-empty" class="empty-state">
          <h2>Campaign Timeline</h2>
          <div id="timeline-list" class="timeline-list"></div>
        </section>

        <section id="details-content" class="hidden"></section>
      </aside>
    </main>
  </div>
  
  <script src="./app.js"></script>
</body>
</html>
